<!DOCTYPE html>
<html lang="en">
<head>

    <title>Button Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<body>
    <header class="top_nav">
        <div class="home" href="morgen-design-system.html">
        Morgen Design System
        </div>
    </header>

    <section>
        <section class="content-section">
        <div class="page-width button-layout">
          <nav class="sidebar">
            <button class="nav_button"> Foundations</button>
            <button class="nav_button"> Components</button>
            <button class="components_sub"> Buttons</button>
            <button class="components_sub"> Separators</button>
            <button class="components_sub"> Inputs</button>
            <button class="nav_button"> Patterns</button>
            <button class="nav_button"> Guidelines</button>
            
          </nav>

        <section class="main-content">
            <h1>Buttons</h1>
              <section class="button-section">
                  <div class="button-content-box">
                    <div class="primary_grid">
                      <h3>Primary Button</h3>
                        <div class="button-row">
                          <button class="primary_button" id="save1"> Save</button>
                          <button class="primary_button" id="save2"> Save</button>
                          <button class="primary_button" id="save3"> Save</button>
                          <button class="primary_button" id="save4"> Save</button>
                          <p>Default Hover Active Disabled</p>
                        </div>
                    </div>
                  </div>  
              
                  <div class="button-content-box-2">
                    <div class="secondary_grid">
                      <h3>Secondary Button</h3>
                        <div class="button-row">
                          <button class="secondary_button" id="edit1"> Edit</button>
                          <button class="secondary_button" id="edit2"> Edit</button>
                          <button class="secondary_button" id="edit3"> Edit</button>
                          <button class="secondary_button" id="edit4"> Edit</button>
                          <p>Default Hover Active Disabled</p>
                        </div>
                    </div>
                  </div>
              </section>    
        </section>          
          
    </section>
